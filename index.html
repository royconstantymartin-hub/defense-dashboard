<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Defense Intelligence Hub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">◉</div>
          <div>
            <p class="brand-top">Defense Intelligence</p>
            <p class="brand-name">Hub Terminal</p>
          </div>
        </div>

        <nav class="nav-group">
          <p class="nav-title">Workspace</p>
          <button class="nav-link active" data-route="dashboard">Dashboard</button>
          <button class="nav-link" data-route="announcements">Announcements</button>
          <button class="nav-link" data-route="mna">M&amp;A Tracker</button>
          <button class="nav-link" data-route="market">Market Data</button>
          <button class="nav-link" data-route="companies">Companies</button>
          <button class="nav-link" data-route="regulations">Regulations</button>
          <button class="nav-link" data-route="products">Products</button>
          <button class="nav-link" data-route="follow">Follow</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Strategic Command Dashboard</h1>
            <p id="pageSubtitle">Traceable, high-signal defense intelligence workflow.</p>
          </div>
          <div class="search-wrap">
            <input id="globalSearch" type="text" placeholder="Search company, ticker, country, product, source..." />
            <div id="searchResults" class="search-results hidden"></div>
          </div>
        </header>

        <section id="dashboardView" class="view active"></section>
        <section id="announcementsView" class="view"></section>
        <section id="mnaView" class="view"></section>
        <section id="marketView" class="view"></section>
        <section id="companiesView" class="view"></section>
        <section id="companyProfileView" class="view"></section>
        <section id="countryView" class="view"></section>
        <section id="regulationsView" class="view"></section>
        <section id="productsView" class="view"></section>
        <section id="followView" class="view"></section>
      </main>
    </div>

    <dialog id="detailModal" class="detail-modal">
      <div id="detailContent"></div>
      <button id="closeModal" class="btn-close">Close</button>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
